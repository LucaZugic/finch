# Source of truth for the local stack. The dev container joins this network and
# reaches every service by name (kafka, flink-jobmanager, localstack, ...).
# New runtime services belong here — never installed on the host.

name: finch

services:
  # ---- Development container (PyCharm attaches here; all commands run inside) ----
  dev:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
    volumes:
      - .:/workspaces/finch:cached
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      AWS_ENDPOINT_URL: http://localstack:4566
      DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
      AWS_DEFAULT_REGION: eu-west-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    depends_on: [kafka, localstack, dynamodb-local]
    command: sleep infinity

  kafka:
    image: apache/kafka:latest
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  flink-jobmanager:
    image: flink:2.0-java17  # local mirror of the MSF FLINK-2_2 runtime
    ports: ["8081:8081"]
    command: jobmanager
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager"

  flink-taskmanager:
    image: flink:2.0-java17
    command: taskmanager
    depends_on: [flink-jobmanager]
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2

  # Long-lived STOMP bridge: Darwin Push Port -> Kafka.
  stomp-bridge:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
    command: uv run python -m finch.adapters.inbound.stomp_bridge
    depends_on: [kafka]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    env_file:
      - .env  # Darwin credentials — never committed; see .env.example

  localstack:
    image: localstack/localstack:latest
    ports: ["4566:4566"]
    environment:
      SERVICES: s3,sns,events,stepfunctions,glue,secretsmanager,lambda

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports: ["8000:8000"]
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb"]
